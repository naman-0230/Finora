<!DOCTYPE html>
<html lang="en" data-theme="sakura-cliff">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finora</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>

    <script src="script.js" defer></script>
</head>

<body>

    <div class="app-container">

        <!-- HEADER -->

        <header class="header">

            <div>
                <h1>Finora</h1>
                <p>Track your money smarter</p>
            </div>

            <button class="theme-btn">
                Theme
            </button>

        </header>



        <!-- BALANCING SECTION -->

        <section class="balance-section">

            <div class="balance-card income">
                <h3>Income</h3>
                <p class="income-value">₹0</p>
            </div>

            <div class="balance-card expense">
                <h3>Expense</h3>
                <p class="expense-value">₹0</p>
            </div>

            <div class="balance-card total">
                <h3>Balance</h3>
                <p class="balance-value">₹0</p>
            </div>

        </section>

        <div class="charts-grid">

            <!-- EXPENSE BREAKDOWN -->

            <div class="chart-card">

                <h3>Expense Breakdown</h3>

                <canvas id="expenseChart"></canvas>

            </div>

            <!-- INCOME VS EXPENSE -->

            <div class="chart-card">

                <h3>Income vs Expense</h3>

                <canvas id="comparisonChart"></canvas>

            </div>

            <!-- MONTHLY TREND -->

            <div class="chart-card">

                <h3>Monthly Spending</h3>

                <canvas id="trendChart"></canvas>

            </div>

        </div>


        <!-- FORM SECTION -->

        <section class="form-section">

            <h2>Add Transaction</h2>

            <form id="transaction-form">

                <div class="form-group">
                    <label>Description</label>
                    <input id="description" type="text" placeholder="Enter description">
                </div>

                <div class="form-row">

                    <div class="form-group">
                        <label>Amount</label>
                        <input id="amount" type="number" placeholder="Enter amount">
                    </div>

                    <div class="form-group">
                        <label>Category</label>

                        <select id="category">
                            <option value="food">Food</option>
                            <option value="transport">Transport</option>
                            <option value="shopping">Shopping</option>
                            <option value="entertainment">Entertainment</option>
                            <option value="bills">Bills</option>
                            <option value="health">Health</option>
                            <option value="education">Education</option>
                            <option value="salary">Salary</option>
                            <option value="freelance">Freelance</option>
                            <option value="investment">Investment</option>
                            <option value="travel">Travel</option>
                            <option value="subscriptions">Subscriptions</option>
                            <option value="rent">Rent</option>
                            <option value="gifts">Gifts</option>
                            <option value="savings">Savings</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                </div>

                <div class="form-row">

                    <div class="form-group">
                        <label>Type</label>

                        <!-- TYPE (pill style) -->
                        <div class="type">

                            <button type="button" class="type-btn income" data-type="income">
                                Income
                            </button>

                            <button type="button" class="type-btn expense" data-type="expense">
                                Expense
                            </button>

                        </div>
                    </div>

                    <div class="form-group">
                        <label>Date</label>
                        <input id="date" type="date">
                    </div>

                </div>

                <div class="form-group">
                    <label>Note</label>
                    <textarea id="note" placeholder="Optional note"></textarea>
                </div>

                <button type="submit" class="submit-btn">
                    Add Transaction
                </button>

            </form>

        </section>

        <!--filters and search-->




        <!-- TRANSACTION SECTION -->

        <section class="transaction-section">

            <div class="section-title">

                <h2>Transactions</h2>

                <div class="transaction-controls">

                    <!-- SEARCH -->
                    <input id="search" type="text" placeholder="Search description..." class="search-input" />

                    <!-- TYPE FILTER (pill style) -->
                    <div class="filter-group">

                        <button class="filter-btn active" data-type="all">
                            All
                        </button>

                        <button class="filter-btn income" data-type="income">
                            Income
                        </button>

                        <button class="filter-btn expense" data-type="expense">
                            Expense
                        </button>

                    </div>

                    <!-- CATEGORY (compact dropdown) -->
                    <div class="select-wrapper">
                        <select id="category-filter" class="custom-select">
                            <option value="all">Category</option>
                            <option value="food">Food</option>
                            <option value="transport">Transport</option>
                            <option value="shopping">Shopping</option>
                            <option value="entertainment">Entertainment</option>
                            <option value="bills">Bills</option>
                            <option value="health">Health</option>
                            <option value="education">Education</option>
                            <option value="salary">Salary</option>
                            <option value="freelance">Freelance</option>
                            <option value="investment">Investment</option>
                            <option value="travel">Travel</option>
                            <option value="subscriptions">Subscriptions</option>
                            <option value="rent">Rent</option>
                            <option value="gifts">Gifts</option>
                            <option value="savings">Savings</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                </div>


            </div>

            <div class="transaction-list">
                <!--now transactions will come form JS-->
            </div>

            <div class="empty-state">
                No transactions added yet.
            </div>

        </section>

    </div>

</body>

</html>
